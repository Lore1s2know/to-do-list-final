<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'rainbow-shift': 'rainbow-shift 8s ease infinite',
          },
          keyframes: {
            'rainbow-shift': {
              '0%, 100%': { backgroundPosition: '0% 50%' },
              '50%': { backgroundPosition: '100% 50%' },
            },
          },
        },
      },
    }
  </script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-red-50 via-yellow-50 via-green-50 via-cyan-50 to-violet-100">
  <div class="mx-auto max-w-2xl px-4 py-10">
    <header class="mb-8 text-center">
      <h1 class="rainbow-text text-4xl font-extrabold tracking-tight sm:text-5xl">
        To-Do List
      </h1>
      <p class="mt-2 text-sm text-slate-600">Stay organized, one colorful task at a time</p>
    </header>

    <main id="app" class="overflow-hidden rounded-2xl border border-white/60 bg-white/80 shadow-xl shadow-violet-200/40 backdrop-blur-sm">
      <!-- Rendered by script.js -->
    </main>

    <footer class="mt-6 text-center text-xs text-slate-500">
      <span id="task-count">0 tasks</span>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
